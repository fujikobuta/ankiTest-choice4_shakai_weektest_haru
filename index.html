<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社会テストアプリ</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 90%;
            max-width: 500px;
            min-height: 200px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            margin-bottom: 30px;
            border: 4px solid #f0f0f0;
            position: relative;
        }

        #question-text {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        #answer-box {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 80%;
            max-width: 300px;
        }

        .big-btn:active {
            transform: translateY(4px);
        }

        #check-btn {
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
        }

        .judge-btns {
            display: none;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .judge-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-sizing: border-box;
        }

        #maru-btn {
            background-color: var(--maru-color);
            box-shadow: var(--maru-shadow);
        }

        #batsu-btn {
            background-color: var(--batsu-color);
            box-shadow: var(--batsu-shadow);
        }

        .secondary-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 70px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Modal for Resume */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }

        /* Practice mode */
        #practice-answer-box {
            font-size: 3rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        #practice-explanation-box {
            font-size: 1rem;
            color: #666;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 16px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        #practice-btn {
            background-color: #9c27b0;
            color: white;
            box-shadow: 0 4px 0 #6a1b7a;
            height: 70px;
        }

        /* Animation */
        .fade-in {
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>社会テストアプリ</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>

        <div id="answer-box"></div>

        <!-- 練習モード用：即時表示の解答と解説 -->
        <div id="practice-answer-box"></div>
        <div id="practice-explanation-box"></div>

        <button id="check-btn" class="big-btn">答えあわせ</button>
        <button id="practice-btn" class="big-btn" style="display:none;">練習しました</button>

        <div class="judge-btns" id="judge-container">
            <button id="maru-btn" class="judge-btn">○</button>
            <button id="batsu-btn" class="judge-btn">×</button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "豪族たちをまとめて大和政権を成立させた、最高権力者を何といいますか。", "n": 1, "a": "大王", "l": "", "practice": false, "p": 1}, {"q": "倭の五王の一人といわれる王の名前が刻まれた鉄剣が出土した、埼玉県にある古墳を答えなさい。", "n": 2, "a": "稲荷山古墳", "l": "", "practice": false, "p": 1}, {"q": "現在の礼儀作法のもととなった、中国の孔子によって開かれた宗教を何といいますか。", "n": 3, "a": "儒教", "l": "", "practice": false, "p": 1}, {"q": "大陸から伝わった宗教を日本に受け入れるかどうかで、豪族の物部氏と激しく対立した豪族は何氏ですか。", "n": 4, "a": "蘇我氏", "l": "", "practice": false, "p": 1}, {"q": "蘇我氏を滅ぼし、後に天皇となった人物はだれですか。", "n": 5, "a": "中大兄皇子", "l": "", "practice": false, "p": 1}, {"q": "薬師寺東塔などに代表される、唐の初期の影響を受けた活気あふれる文化を何文化といいますか。", "n": 6, "a": "白鳳文化", "l": "", "practice": false, "p": 1}, {"q": "後鳥羽上皇が政治の実権を取り戻そうとして事件を起こしたときの幕府の最高責任者はだれですか。", "n": 7, "a": "北条義時", "l": "", "practice": false, "p": 1}, {"q": "墨の濃淡で表現される絵画の技法を明にわたって学んだ人物はだれですか。", "n": 8, "a": "雪舟", "l": "", "practice": false, "p": 1}, {"q": "出雲の国の阿国によってはじめられた、踊りを交えた芝居を何といいますか。", "n": 9, "a": "かぶき踊り", "l": "", "practice": false, "p": 1}, {"q": "1639年に鎖国を完成させた将軍はだれですか。", "n": 10, "a": "徳川家光", "l": "", "practice": false, "p": 1}, {"q": "表向きは中国の支配下にある琉球王国を支配下に置いた藩はどこですか。", "n": 11, "a": "薩摩藩", "l": "", "practice": false, "p": 1}, {"q": "朝鮮との国交回復に尽力し、仲立ちとなっていた藩はどこですか。", "n": 12, "a": "対馬藩", "l": "", "practice": false, "p": 1}, {"q": "東海道の様子を生き生きと描いた「東海道五十三次」の作者はだれですか。", "n": 13, "a": "歌川広重（安藤広重）", "l": "", "practice": true, "p": 1}, {"q": "幕府の外交のやり方に反対した吉田松陰などの人物を厳しく処罰した出来事を何といいますか。", "n": 14, "a": "安政の大獄", "l": "", "practice": false, "p": 1}, {"q": "1860年に幕府の外交に対して不満をもつ水戸浪士と薩摩浪士に暗殺された大老はだれですか。", "n": 15, "a": "井伊直弼", "l": "", "practice": false, "p": 1}, {"q": "1860年、大老が暗殺された事件を何といいますか。", "n": 16, "a": "桜田門外の変", "l": "", "practice": false, "p": 1}, {"q": "幕末当時の日本からの主な輸出品を答えなさい。", "n": 17, "a": "生糸", "l": "", "practice": false, "p": 1}, {"q": "幕末当時の最大の貿易相手国を答えなさい。", "n": 18, "a": "イギリス", "l": "", "practice": false, "p": 1}, {"q": "1862年に大名行列を横切ったイギリス人を薩摩藩士が殺傷した事件を何といいますか。", "n": 19, "a": "生麦事件", "l": "", "practice": false, "p": 1}, {"q": "長州藩出身で、奇兵隊を組織したり、攘夷運動を行ったりした人物はだれですか。", "n": 20, "a": "高杉晋作", "l": "", "practice": false, "p": 1}, {"q": "薩摩藩と長州藩の同盟を結ぶ際に仲立ちとなった人物はだれですか。", "n": 21, "a": "坂本竜馬（龍馬）", "l": "", "practice": false, "p": 1}, {"q": "薩長同盟を結んだときの薩摩側の中心人物は大久保利通とだれですか。", "n": 22, "a": "西郷隆盛", "l": "", "practice": false, "p": 1}, {"q": "長州藩出身で、薩長同盟や岩倉使節団に参加した人物はだれですか。", "n": 23, "a": "木戸孝允", "l": "", "practice": false, "p": 1}, {"q": "江戸幕府15代将軍はだれですか。", "n": 24, "a": "徳川慶喜", "l": "", "practice": false, "p": 1}, {"q": "1867年に15代将軍が朝廷に政治の実権を返還したことを何といいますか。", "n": 25, "a": "大政奉還", "l": "", "practice": false, "p": 1}, {"q": "明治政府が近代化を図った結果、人々の生活が欧米風に変化したことを何といいますか。", "n": 26, "a": "文明開化", "l": "", "practice": false, "p": 1}, {"q": "明治新政府軍と旧幕府軍との京都鳥羽・伏見の戦いから函館五稜郭の戦いまでを何戦争といいますか。", "n": 27, "a": "戊辰戦争", "l": "", "practice": false, "p": 1}, {"q": "1868年に、明治天皇が神に誓うというかたちで示された新政府の政治方針を何といいますか。", "n": 28, "a": "五箇条の御誓文", "l": "", "practice": false, "p": 1}, {"q": "1869年に出された、それまで大名が治めていた土地と人民を朝廷に返還する命令を何といいますか。", "n": 29, "a": "版籍奉還", "l": "", "practice": false, "p": 1}, {"q": "1871年に藩を廃止して府県を設置し、政府の役人に治めさせたことを何といいますか。", "n": 30, "a": "廃藩置県", "l": "", "practice": false, "p": 1}, {"q": "1871年に不平等条約の改正交渉のために欧米に派遣された全権大使はだれですか。", "n": 31, "a": "岩倉具視", "l": "", "practice": false, "p": 1}, {"q": "明治政府がつくった標語で、軍事力と経済力を高めようという言葉を漢字4字で答えなさい。", "n": 32, "a": "富国強兵", "l": "", "practice": false, "p": 1}, {"q": "満20歳以上の男子に兵役の義務を負わせた法令を何といいますか。", "n": 33, "a": "徴兵令", "l": "", "practice": false, "p": 1}, {"q": "土地の値段の3%の税金を現金で土地所有者に納めさせるようにした政策を何といいますか。", "n": 34, "a": "地租改正", "l": "", "practice": false, "p": 1}, {"q": "明治政府のつくった標語で、産業をおこし、発展させようという意味を持った言葉を漢字4字で答えなさい。", "n": 35, "a": "殖産興業", "l": "", "practice": false, "p": 1}, {"q": "1872年に日本初の官営工場として群馬県に建設された工場の名前を答えなさい。", "n": 36, "a": "富岡製糸場", "l": "", "practice": false, "p": 1}, {"q": "近代的な郵便制度を整えたことから「郵便の父」とよばれる人物はだれですか。", "n": 37, "a": "前島密", "l": "", "practice": false, "p": 1}, {"q": "1872年に、日本で初めて鉄道が開通した際の路線区間はどことどこを結んでいましたか。", "n": 38, "a": "新橋と横浜", "l": "", "practice": false, "p": 1}, {"q": "『学問のすすめ』を著し、学問の大切さと人間の平等を説いた人物はだれですか。", "n": 39, "a": "福沢諭吉", "l": "", "practice": false, "p": 1}, {"q": "薩摩や長州などの一部の藩出身者だけが中心になって行っていた政治を何といいますか。", "n": 40, "a": "藩閥政治", "l": "", "practice": false, "p": 1}, {"q": "鎖国を続けていた朝鮮を武力によって開国させようという考え方を何といいますか。", "n": 41, "a": "征韓論", "l": "", "practice": false, "p": 1}, {"q": "1874年に、国会を開いて政治を行うように要求を出した土佐藩出身の人物はだれですか。", "n": 42, "a": "板垣退助", "l": "", "practice": false, "p": 1}, {"q": "明治時代に起こった、国会を開いて政治を行うよう要求する全国的な運動を何といいますか。", "n": 43, "a": "自由民権運動", "l": "", "practice": false, "p": 1}, {"q": "1877年におきた不平士族の反乱を何といいますか。", "n": 44, "a": "西南戦争", "l": "", "practice": false, "p": 1}, {"q": "1882年に憲法の調査のためヨーロッパに派遣され、後に初代内閣総理大臣になった人物はだれですか。", "n": 45, "a": "伊藤博文", "l": "", "practice": false, "p": 1}, {"q": "明治時代、憲法をつくるにあたり、参考にしたのはどこの国の憲法ですか。", "n": 46, "a": "ドイツ（プロイセン・プロシア）", "l": "", "practice": false, "p": 1}, {"q": "1889年2月11日に、天皇が国民に授けるという形で発布された憲法を何といいますか。", "n": 47, "a": "大日本帝国憲法", "l": "", "practice": false, "p": 1}, {"q": "帝国議会にあった2つの議院名をそれぞれ答えなさい。", "n": 48, "a": "衆議院・貴族院", "l": "", "practice": false, "p": 1}, {"q": "第一回帝国議会選挙の際に選挙権が認められていたのはどのような人々ですか。", "n": 49, "a": "直接国税15円以上を納める満25歳以上の男子", "l": "", "practice": false, "p": 1}, {"q": "1886年に紀伊半島沖でイギリス船が沈没し日本人乗客が犠牲になった事件を何事件といいますか。", "n": 50, "a": "ノルマントン号事件", "l": "", "practice": false, "p": 1}, {"q": "1894年に治外法権の撤廃に成功した外務大臣はだれですか。", "n": 51, "a": "陸奥宗光", "l": "", "practice": false, "p": 1}, {"q": "1911年に関税自主権の回復に成功した外務大臣はだれですか。", "n": 52, "a": "小村寿太郎", "l": "", "practice": false, "p": 1}, {"q": "日清戦争の講和条約を答えなさい。", "n": 53, "a": "下関条約", "l": "", "practice": false, "p": 1}, {"q": "1895年の条約で得た、1945年まで日本の領土だった島の名前を何といいますか。", "n": 54, "a": "台湾", "l": "", "practice": false, "p": 1}, {"q": "ロシア、フランス、ドイツが日本に遼東半島を返還するように強く要求したことを何といいますか。", "n": 55, "a": "三国干渉", "l": "", "practice": false, "p": 1}, {"q": "ロシアに対抗するために、日本が1902年に結んだ同盟は何同盟ですか。", "n": 56, "a": "日英同盟", "l": "", "practice": false, "p": 1}, {"q": "日露戦争に反対し、「君死にたまふことなかれ」という詩を雑誌に載せた女流歌人の名前を答えなさい。", "n": 57, "a": "与謝野晶子", "l": "", "practice": false, "p": 1}, {"q": "日露戦争の講和条約を何といいますか。", "n": 58, "a": "ポーツマス条約", "l": "", "practice": false, "p": 1}, {"q": "初代の韓国統監であった人物が射殺された翌年に、韓国を日本の植民地にしたできごとを何といいますか。", "n": 59, "a": "韓国併合", "l": "", "practice": false, "p": 1}, {"q": "日清戦争の賠償金をもとに、現在の北九州に建設された工場の名前を答えなさい。", "n": 60, "a": "八幡製鉄所", "l": "", "practice": false, "p": 1}, {"q": "日本に招かれた外国人で、大森貝塚を発見した人の名前を答えなさい。", "n": 61, "a": "モース", "l": "", "practice": false, "p": 1}, {"q": "日本に招かれた外国人で、札幌農学校の教師としてアメリカ式農業を伝えた人の名前を答えなさい。", "n": 62, "a": "クラーク", "l": "", "practice": false, "p": 1}, {"q": "全国に小学校がつくられるきっかけになった、1872年に定められた制度を何といいますか。", "n": 63, "a": "学制", "l": "", "practice": false, "p": 1}];
        // QUESTIONS_DATA_END

        let questions = [];
        let currentIndex = 0;
        let results = [];

        const STORAGE_KEY = 'kanji_test_progress';

        const fileInput = document.getElementById('file-input');
        const screenUpload = document.getElementById('screen-upload');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const questionText = document.getElementById('question-text');
        const answerBox = document.getElementById('answer-box');
        const checkBtn = document.getElementById('check-btn');
        const practiceBtn = document.getElementById('practice-btn');
        const practiceAnswerBox = document.getElementById('practice-answer-box');
        const practiceExplanationBox = document.getElementById('practice-explanation-box');
        const backBtn = document.getElementById('back-btn');
        const judgeContainer = document.getElementById('judge-container');
        const progressText = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');
        const resumeModal = document.getElementById('resume-modal');

        // Initial check for embedded data
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Check embedded questions...");
            if (typeof embeddedQuestions !== 'undefined' && embeddedQuestions && Array.isArray(embeddedQuestions) && embeddedQuestions.length > 0) {
                console.log("Found embedded questions:", embeddedQuestions.length);
                questions = embeddedQuestions;
                checkResume();
            } else {
                console.log("No embedded questions found.");
            }
        });

        function checkResume() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    console.error("Resume error:", e);
                    clearProgress ();
                 }
            }
            startQuiz(true);
        }

         function  saveProgress() {
            const state = {
                index: currentIndex,
                results: results,
                total: questions.length
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // RGB Color Priority logic
        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150 && (g < 200 || (r < 100 && g > 150 && b > 200))) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {
                    type: 'array',
                    cellStyles: true
                });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) {
                    alert("「予定表」シートが見つかりませんでした。");
                    return;
                }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })],
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })],
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })],
                        cellQ = worksheet[XLSX.utils.encode_cell({ r: r, c: 16 })];
                    if (!cellI || !cellK) continue;
                    const q = cellI.v,
                        numVal = cellJ ? cellJ.v : 0,
                        num = isNaN(parseInt(numVal)) ? 0 : parseInt(numVal),
                        a = cellK.v,
                        l = cellL ? String(cellL.v).trim() : "",
                        qVal = cellQ ? cellQ.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    if (!q || !a || q === "問題文" || a === "解答") continue;
                    rawData.push({
                        q: q,
                        n: num,
                        a: a,
                        l: l,
                        practice: practice,
                        p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) {
                    alert("問題が見つかりませんでした。");
                    return;
                }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) {
                currentIndex = 0;
                results = [];
                clearProgress();
            }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            questionText.innerText = q.q;
            
            // 文字数に応じてフォントサイズを動的に変更
            const len = q.q.length;
            if (len < 15) {
                questionText.style.fontSize = "2.5rem";
            } else if (len < 30) {
                questionText.style.fontSize = "1.8rem";
            } else if (len < 60) {
                questionText.style.fontSize = "1.4rem";
            } else {
                questionText.style.fontSize = "1.1rem";
            }
            
            answerBox.innerText = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";

            if (q.practice) {
                // 練習モード：解答・解説を即表示
                checkBtn.style.display = "none";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "block";
                practiceAnswerBox.innerText = q.a;
                if (q.l) {
                    practiceExplanationBox.style.display = "block";
                    practiceExplanationBox.innerText = q.l;
                } else {
                    practiceExplanationBox.style.display = "none";
                }
                practiceBtn.style.display = "block";
            } else {
                // 通常モード
                checkBtn.style.display = "block";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "none";
                practiceExplanationBox.style.display = "none";
                practiceBtn.style.display = "none";
            }
        }

        checkBtn.addEventListener('click', () => {
            answerBox.innerText = questions[currentIndex].a;
            checkBtn.style.display = "none";
            judgeContainer.style.display = "flex";
        });

        practiceBtn.addEventListener('click', () => {
            recordResult('練習');
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('maru-btn').addEventListener('click', () => recordResult('○'));
        document.getElementById('batsu-btn').addEventListener('click', () => recordResult('×'));

        function recordResult(judge) {
            results.push({
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    openLine(text);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                openLine(text);
            } catch (e) {
                alert("コピー失敗");
            }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => {
                alert("結果をコピーしました！LINEに貼り付けて送ってください。");
            }, 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
