<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社会テストアプリ</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 90%;
            max-width: 500px;
            min-height: 200px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            margin-bottom: 30px;
            border: 4px solid #f0f0f0;
            position: relative;
        }

        #question-text {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        #answer-box {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 80%;
            max-width: 300px;
        }

        .big-btn:active {
            transform: translateY(4px);
        }

        #check-btn {
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
        }

        .judge-btns {
            display: none;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .judge-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-sizing: border-box;
        }

        #maru-btn {
            background-color: var(--maru-color);
            box-shadow: var(--maru-shadow);
        }

        #batsu-btn {
            background-color: var(--batsu-color);
            box-shadow: var(--batsu-shadow);
        }

        .secondary-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 70px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Modal for Resume */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }

        /* Practice mode */
        #practice-answer-box {
            font-size: 3rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        #practice-explanation-box {
            font-size: 1rem;
            color: #666;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 16px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        #practice-btn {
            background-color: #9c27b0;
            color: white;
            box-shadow: 0 4px 0 #6a1b7a;
            height: 70px;
        }

        /* Animation */
        .fade-in {
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>社会テストアプリ</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>

        <div id="answer-box"></div>

        <!-- 練習モード用：即時表示の解答と解説 -->
        <div id="practice-answer-box"></div>
        <div id="practice-explanation-box"></div>

        <button id="check-btn" class="big-btn">答えあわせ</button>
        <button id="practice-btn" class="big-btn" style="display:none;">練習しました</button>

        <div class="judge-btns" id="judge-container">
            <button id="maru-btn" class="judge-btn">○</button>
            <button id="batsu-btn" class="judge-btn">×</button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "593年に推古天皇の摂政になった人物名を答えなさい。", "n": 1, "a": "聖徳太子", "l": "", "practice": false, "p": 1}, {"q": "603年に定められた、家柄に関係なく能力のある人物を役人に登用するための制度を何といいますか。", "n": 2, "a": "冠位十二階", "l": "", "practice": false, "p": 1}, {"q": "604年に定められた、豪族に対する役人としての心構えを何といいますか。", "n": 3, "a": "十七条の憲法（憲法十七条）", "l": "", "practice": false, "p": 1}, {"q": "薬師寺東塔などに代表される、唐の初期の影響を受けた活気あふれる文化を何文化といいますか。", "n": 4, "a": "白鳳文化", "l": "", "practice": true, "p": 1}, {"q": "奈良時代の苦しい農民の暮らしを「貧窮問答歌」によんだのはだれですか。", "n": 5, "a": "山上憶良", "l": "", "practice": false, "p": 1}, {"q": "初めて唐に朝廷の使者として遣わされた人物はだれですか。", "n": 6, "a": "犬上御田鍬", "l": "", "practice": false, "p": 1}, {"q": "留学生として中国にわたって皇帝につかえ、帰国できずに唐で生涯を終えた人物はだれですか。", "n": 7, "a": "阿倍仲麻呂", "l": "", "practice": false, "p": 1}, {"q": "総国分寺にある、天皇が使用していた宝物や文物が保管されていた倉庫を何といいますか。", "n": 8, "a": "正倉院", "l": "", "practice": false, "p": 1}, {"q": "橋や道路づくりを行い民衆から慕われ、大仏づくりにも協力した僧はだれですか。", "n": 9, "a": "行基", "l": "", "practice": false, "p": 1}, {"q": "712年に完成した、太安万侶がまとめた日本最古の歴史書を何といいますか。", "n": 10, "a": "古事記", "l": "", "practice": false, "p": 1}, {"q": "720年に舎人親王を中心として完成した日本の歴史書を何といいますか。", "n": 11, "a": "日本書紀", "l": "", "practice": false, "p": 1}, {"q": "約4500首の歌がおさめられた、日本最古の和歌集を何といいますか。", "n": 12, "a": "万葉集", "l": "", "practice": false, "p": 1}, {"q": "794年に都を平安京にうつした天皇はだれですか。", "n": 13, "a": "桓武天皇", "l": "", "practice": false, "p": 1}, {"q": "「この世をば わが世とぞおもふ 望月の かけたることも なしと思へば」という歌をよんだ人物はだれですか。", "n": 14, "a": "藤原道長", "l": "", "practice": false, "p": 1}, {"q": "藤原氏の全盛期を築いた父子のうち、阿弥陀堂を建てた子の名前を答えなさい。", "n": 15, "a": "藤原頼通", "l": "", "practice": false, "p": 1}, {"q": "1086年に、子どもに天皇の位を譲り、自らは上皇として政治を行った人物はだれですか。", "n": 16, "a": "白河上皇", "l": "", "practice": false, "p": 1}, {"q": "894年、中国への使者の派遣を停止することを進言した人物はだれですか。", "n": 17, "a": "菅原道真", "l": "", "practice": false, "p": 1}, {"q": "藤原道長をモデルにしたといわれる、貴族の生活を描いた文学作品の作者名を答えなさい。", "n": 18, "a": "紫式部", "l": "", "practice": false, "p": 1}, {"q": "宮廷の女官が日常のことを随筆にして著した文学作品の作者名を答えなさい。", "n": 19, "a": "清少納言", "l": "", "practice": false, "p": 1}, {"q": "遣唐使の停止後に栄え、日本の風土や文化に合った文化を何文化といいますか。", "n": 20, "a": "国風文化", "l": "", "practice": false, "p": 1}, {"q": "平安貴族の住まいの建築様式を何といいますか。", "n": 21, "a": "寝殿造", "l": "", "practice": false, "p": 1}, {"q": "阿弥陀仏を信仰することで、死後、極楽浄土へいけるという教えを何といいますか。", "n": 22, "a": "浄土教", "l": "", "practice": false, "p": 1}, {"q": "奥州平泉の藤原氏が建てた黄金づくりの豪華な阿弥陀堂を何といいますか。", "n": 23, "a": "中尊寺金色堂", "l": "", "practice": false, "p": 1}, {"q": "1185年、源氏と平氏の最後の戦いを何といいますか。", "n": 24, "a": "壇ノ浦の戦い", "l": "", "practice": false, "p": 1}, {"q": "1185年、源氏と平氏の最後の戦いは現在の何県で行われましたか。", "n": 25, "a": "山口県", "l": "", "practice": false, "p": 1}, {"q": "1192年、征夷大将軍に任じられた人物名を答えなさい。", "n": 26, "a": "源頼朝", "l": "", "practice": false, "p": 1}, {"q": "1221年に後鳥羽上皇が政治の実権を取り戻そうとして起こした事件を何といいますか。", "n": 27, "a": "承久の乱", "l": "", "practice": false, "p": 1}, {"q": "朝廷の監視のために、京都に設置された役所を何といいますか。", "n": 28, "a": "六波羅探題", "l": "", "practice": false, "p": 1}, {"q": "1232年につくられた、武家としてはじめての法律を何といいますか。", "n": 29, "a": "御成敗式目（貞永式目）", "l": "", "practice": false, "p": 1}, {"q": "1232年、武家のための法律が出されたときの幕府の最高責任者はだれですか。", "n": 30, "a": "北条泰時", "l": "", "practice": false, "p": 1}, {"q": "1279年に南宋をほろぼして中国全土を統一した、モンゴル帝国の皇帝はだれですか。", "n": 31, "a": "フビライ・ハン", "l": "", "practice": false, "p": 1}, {"q": "中国の皇帝に仕えたイタリアの商人で、『東方見聞録』の中で日本のことを書いた人物はだれですか。", "n": 32, "a": "マルコ・ポーロ", "l": "", "practice": false, "p": 1}, {"q": "元軍が攻めてきたときの幕府の最高責任者はだれですか。", "n": 33, "a": "北条時宗", "l": "", "practice": false, "p": 1}, {"q": "後に庶民を中心に急激に広まっていく、親鸞の広めた教えを何といいますか。", "n": 34, "a": "浄土真宗", "l": "", "practice": false, "p": 1}, {"q": "全国を行脚しながら「おどり念仏」を広めた一遍の教えを何といいますか。", "n": 35, "a": "時宗", "l": "", "practice": false, "p": 1}, {"q": "民衆に「南無妙法蓮華経」と唱えることを説いた日蓮が広めた教えを何といいますか。", "n": 36, "a": "日蓮宗（法華宗）", "l": "", "practice": false, "p": 1}, {"q": "臨済宗を開き、中国から茶の種子を持ち帰ったことでも知られる僧はだれですか。", "n": 37, "a": "栄西", "l": "", "practice": false, "p": 1}, {"q": "金剛力士像をつくった彫刻家の名前を二人答えなさい。", "n": 38, "a": "運慶・快慶", "l": "", "practice": false, "p": 1}, {"q": "鎌倉時代に成立した、平家の滅亡を描いた軍記物を何といいますか。", "n": 39, "a": "平家物語", "l": "", "practice": false, "p": 1}, {"q": "幕府に不満をもつ御家人達を率いて、1333年に鎌倉幕府を倒した天皇はだれですか。", "n": 40, "a": "後醍醐天皇", "l": "", "practice": false, "p": 1}, {"q": "鎌倉幕府を倒した後、中心となっていた天皇が自ら行った政治を何といいますか。", "n": 41, "a": "建武の新政", "l": "", "practice": false, "p": 1}, {"q": "鎌倉幕府を倒した天皇に従った御家人で、後に室町幕府を開いた人物名を答えなさい。", "n": 42, "a": "足利尊氏", "l": "", "practice": false, "p": 1}, {"q": "室町幕府の3代将軍を答えなさい。", "n": 43, "a": "足利義満", "l": "", "practice": false, "p": 1}, {"q": "鎌倉時代の終わりから室町時代に、朝鮮や中国で海賊行為を行っていた者たちを何といいますか。", "n": 44, "a": "倭寇", "l": "", "practice": false, "p": 1}, {"q": "室町幕府の3代将軍が行った中国との貿易を、当時の王朝の名前から何といいますか。", "n": 45, "a": "日明貿易", "l": "", "practice": false, "p": 1}, {"q": "室町幕府の3代将軍が行った中国との貿易で使われた、中国が発行した札を何といいますか。", "n": 46, "a": "勘合（勘合符）", "l": "", "practice": false, "p": 1}, {"q": "1428年に、現在の滋賀県で発生した農民たちの反乱を何といいますか。", "n": 47, "a": "正長の土一揆", "l": "", "practice": false, "p": 1}, {"q": "1485年に、現在の京都で国人といわれる土着の武士が中心になって起こした反乱を何といいますか。", "n": 48, "a": "山城の国一揆", "l": "", "practice": false, "p": 1}, {"q": "出雲の国の阿国によってはじめられた、踊りを交えた芝居を何といいますか。", "n": 49, "a": "かぶき踊り", "l": "", "practice": true, "p": 1}, {"q": "大名に米を納めさせる代わりに参勤交代の期間をゆるめることを定めた制度を何といいますか。", "n": 50, "a": "上米の制", "l": "", "practice": false, "p": 1}, {"q": "徳川吉宗によって設置された、要望を受け付けるための箱を何といいますか。", "n": 51, "a": "目安箱", "l": "", "practice": false, "p": 1}, {"q": "江戸時代に開発された農具で、深く耕すための道具を何といいますか。", "n": 52, "a": "備中ぐわ", "l": "", "practice": false, "p": 1}, {"q": "江戸時代に開発された農具で、風力によって米つぶともみがらを選別する道具を何といいますか。", "n": 53, "a": "唐み", "l": "", "practice": false, "p": 1}, {"q": "大阪に建てられた、大名が年貢米や特産物をお金に換えるために保管する施設を何といいますか。", "n": 54, "a": "蔵屋敷", "l": "", "practice": false, "p": 1}, {"q": "10代将軍の老中として、大商人の力を借りて幕府の財政の立て直しを図った人物はだれですか。", "n": 55, "a": "田沼意次", "l": "", "practice": false, "p": 1}, {"q": "江戸時代の同業者同士の組合のことを何といいますか。", "n": 56, "a": "株仲間", "l": "", "practice": false, "p": 1}, {"q": "11代将軍の老中として「寛政の改革」を行った人物はだれですか。", "n": 57, "a": "松平定信", "l": "", "practice": false, "p": 1}, {"q": "「寛政の改革」の時期に、唯一幕府の学校で認めていた学問を何といいますか。", "n": 58, "a": "朱子学", "l": "", "practice": false, "p": 1}, {"q": "1840年にイギリスと清の間で起こり、イギリスが勝利した戦争を何といいますか。", "n": 59, "a": "アヘン戦争", "l": "", "practice": false, "p": 1}, {"q": "12代将軍の老中として「天保の改革」を行った人物はだれですか。", "n": 60, "a": "水野忠邦", "l": "", "practice": false, "p": 1}, {"q": "町中の米屋や商人などを襲い、米を出させたり家を壊したりしたことを何といいますか。", "n": 61, "a": "打ちこわし", "l": "", "practice": false, "p": 1}, {"q": "天保の大きなききんが起きた際に、民衆を救うために大阪で反乱を起こした幕府の元役人はだれですか。", "n": 62, "a": "大塩平八郎", "l": "", "practice": false, "p": 1}, {"q": "19世紀初めごろ、江戸を中心に栄えたこっけいや皮肉などを楽しむ町人文化を何文化といいますか。", "n": 63, "a": "化政文化", "l": "", "practice": false, "p": 1}, {"q": "伊勢松阪の医者出身で「古事記伝」を著した人物はだれですか。", "n": 64, "a": "本居宣長", "l": "", "practice": false, "p": 1}, {"q": "日本の古い書物を研究して日本人本来のものの考えを明らかにしていく学問を何といいますか。", "n": 65, "a": "国学", "l": "", "practice": false, "p": 1}, {"q": "杉田玄白・前野良沢らが中心になり、「ターヘル・アナトミア」を翻訳して出版した本は何ですか。", "n": 66, "a": "解体新書", "l": "", "practice": false, "p": 1}, {"q": "1824年に長崎郊外に鳴滝塾を開いたドイツ人医師はだれですか。", "n": 67, "a": "シーボルト", "l": "", "practice": false, "p": 1}, {"q": "東海道の様子を生き生きと描いた「東海道五十三次」の作者はだれですか。", "n": 68, "a": "歌川広重（安藤広重）", "l": "", "practice": false, "p": 1}, {"q": "富士山の様々な姿を描いた「富嶽三十六景」の作者はだれですか。", "n": 69, "a": "葛飾北斎", "l": "", "practice": false, "p": 1}, {"q": "町人や農民の子が「読み、書き、そろばん」などを習った教育施設を何といいますか。", "n": 70, "a": "寺子屋", "l": "", "practice": false, "p": 1}, {"q": "18世紀、17年の歳月をかけて「大日本沿海輿地全図」という正確な地図を完成させたのはだれですか。", "n": 71, "a": "伊能忠敬", "l": "", "practice": false, "p": 1}, {"q": "1792年に根室に来航し、通商を求めたロシア人はだれですか。", "n": 72, "a": "ラクスマン", "l": "", "practice": false, "p": 1}, {"q": "1825年に、幕府が鎖国を守るために外国船に対して武力行使をするように定めた命令を何といいますか。", "n": 73, "a": "外国船打払令（異国船打払令）", "l": "", "practice": false, "p": 1}, {"q": "1837年に、日本人漂流者をのせて来航したアメリカ船を幕府が砲撃した事件を何といいますか。", "n": 74, "a": "モリソン号事件", "l": "", "practice": false, "p": 1}, {"q": "アメリカ船を幕府が追い払った事件を批判した高野長英・渡辺崋山が処罰された出来事を何といいますか。", "n": 75, "a": "蛮社の獄", "l": "", "practice": false, "p": 1}, {"q": "1853年、浦賀に来航し開国を求めた人物はだれですか。", "n": 76, "a": "ペリー", "l": "", "practice": false, "p": 1}, {"q": "1854年に、幕府とアメリカとの間で結ばれた条約を何といいますか。", "n": 77, "a": "日米和親条約", "l": "", "practice": false, "p": 1}, {"q": "1858年に、幕府とアメリカとの間で結ばれた条約を何といいますか。", "n": 78, "a": "日米修好通商条約", "l": "", "practice": false, "p": 1}, {"q": "アメリカと1858年に条約を結んだ際のアメリカ側の代表者はだれですか。", "n": 79, "a": "ハリス", "l": "", "practice": false, "p": 1}];
        // QUESTIONS_DATA_END

        let questions = [];
        let currentIndex = 0;
        let results = [];

        const STORAGE_KEY = 'kanji_test_progress';

        const fileInput = document.getElementById('file-input');
        const screenUpload = document.getElementById('screen-upload');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const questionText = document.getElementById('question-text');
        const answerBox = document.getElementById('answer-box');
        const checkBtn = document.getElementById('check-btn');
        const practiceBtn = document.getElementById('practice-btn');
        const practiceAnswerBox = document.getElementById('practice-answer-box');
        const practiceExplanationBox = document.getElementById('practice-explanation-box');
        const backBtn = document.getElementById('back-btn');
        const judgeContainer = document.getElementById('judge-container');
        const progressText = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');
        const resumeModal = document.getElementById('resume-modal');

        // Initial check for embedded data
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Check embedded questions...");
            if (typeof embeddedQuestions !== 'undefined' && embeddedQuestions && Array.isArray(embeddedQuestions) && embeddedQuestions.length > 0) {
                console.log("Found embedded questions:", embeddedQuestions.length);
                questions = embeddedQuestions;
                checkResume();
            } else {
                console.log("No embedded questions found.");
            }
        });

        function checkResume() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    console.error("Resume error:", e);
                    clearProgress ();
                 }
            }
            startQuiz(true);
        }

         function  saveProgress() {
            const state = {
                index: currentIndex,
                results: results,
                total: questions.length
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // RGB Color Priority logic
        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150 && (g < 200 || (r < 100 && g > 150 && b > 200))) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {
                    type: 'array',
                    cellStyles: true
                });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) {
                    alert("「予定表」シートが見つかりませんでした。");
                    return;
                }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })],
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })],
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })],
                        cellQ = worksheet[XLSX.utils.encode_cell({ r: r, c: 16 })];
                    if (!cellI || !cellK) continue;
                    const q = cellI.v,
                        numVal = cellJ ? cellJ.v : 0,
                        num = isNaN(parseInt(numVal)) ? 0 : parseInt(numVal),
                        a = cellK.v,
                        l = cellL ? String(cellL.v).trim() : "",
                        qVal = cellQ ? cellQ.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    if (!q || !a || q === "問題文" || a === "解答") continue;
                    rawData.push({
                        q: q,
                        n: num,
                        a: a,
                        l: l,
                        practice: practice,
                        p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) {
                    alert("問題が見つかりませんでした。");
                    return;
                }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) {
                currentIndex = 0;
                results = [];
                clearProgress();
            }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            questionText.innerText = q.q;
            
            // 文字数に応じてフォントサイズを動的に変更
            const len = q.q.length;
            if (len < 15) {
                questionText.style.fontSize = "2.5rem";
            } else if (len < 30) {
                questionText.style.fontSize = "1.8rem";
            } else if (len < 60) {
                questionText.style.fontSize = "1.4rem";
            } else {
                questionText.style.fontSize = "1.1rem";
            }
            
            answerBox.innerText = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";

            if (q.practice) {
                // 練習モード：解答・解説を即表示
                checkBtn.style.display = "none";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "block";
                practiceAnswerBox.innerText = q.a;
                if (q.l) {
                    practiceExplanationBox.style.display = "block";
                    practiceExplanationBox.innerText = q.l;
                } else {
                    practiceExplanationBox.style.display = "none";
                }
                practiceBtn.style.display = "block";
            } else {
                // 通常モード
                checkBtn.style.display = "block";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "none";
                practiceExplanationBox.style.display = "none";
                practiceBtn.style.display = "none";
            }
        }

        checkBtn.addEventListener('click', () => {
            answerBox.innerText = questions[currentIndex].a;
            checkBtn.style.display = "none";
            judgeContainer.style.display = "flex";
        });

        practiceBtn.addEventListener('click', () => {
            recordResult('練習');
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('maru-btn').addEventListener('click', () => recordResult('○'));
        document.getElementById('batsu-btn').addEventListener('click', () => recordResult('×'));

        function recordResult(judge) {
            results.push({
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    openLine(text);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                openLine(text);
            } catch (e) {
                alert("コピー失敗");
            }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => {
                alert("結果をコピーしました！LINEに貼り付けて送ってください。");
            }, 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
