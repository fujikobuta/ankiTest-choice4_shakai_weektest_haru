<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社会テストアプリ</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 90%;
            max-width: 500px;
            min-height: 200px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            margin-bottom: 30px;
            border: 4px solid #f0f0f0;
            position: relative;
        }

        #question-text {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        #answer-box {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 80%;
            max-width: 300px;
        }

        .big-btn:active {
            transform: translateY(4px);
        }

        #check-btn {
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
        }

        .judge-btns {
            display: none;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .judge-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-sizing: border-box;
        }

        #maru-btn {
            background-color: var(--maru-color);
            box-shadow: var(--maru-shadow);
        }

        #batsu-btn {
            background-color: var(--batsu-color);
            box-shadow: var(--batsu-shadow);
        }

        .secondary-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 70px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Modal for Resume */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }

        /* Practice mode */
        #practice-answer-box {
            font-size: 3rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        #practice-explanation-box {
            font-size: 1rem;
            color: #666;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 16px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        #practice-btn {
            background-color: #9c27b0;
            color: white;
            box-shadow: 0 4px 0 #6a1b7a;
            height: 70px;
        }

        /* Animation */
        .fade-in {
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>社会テストアプリ</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>

        <div id="answer-box"></div>

        <!-- 練習モード用：即時表示の解答と解説 -->
        <div id="practice-answer-box"></div>
        <div id="practice-explanation-box"></div>

        <button id="check-btn" class="big-btn">答えあわせ</button>
        <button id="practice-btn" class="big-btn" style="display:none;">練習しました</button>

        <div class="judge-btns" id="judge-container">
            <button id="maru-btn" class="judge-btn">○</button>
            <button id="batsu-btn" class="judge-btn">×</button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "701年に文武天皇が、唐の律令を参考に定めたきまりを何といいますか。", "n": 1, "a": "大宝律令", "l": "", "practice": false, "p": 1}, {"q": "701年に定められたきまりで、国の長として任命された役人を何といいますか。", "n": 2, "a": "国司", "l": "", "practice": false, "p": 1}, {"q": "都で10日間働くかわりに布を納める税", "n": 3, "a": "②庸", "l": "", "practice": false, "p": 1}, {"q": "743年に定められた、自分で開墾した土地を永久に使用してよいことを認めた法律を何といいますか。", "n": 4, "a": "墾田永年私財法", "l": "", "practice": false, "p": 1}, {"q": "743年に定められた法律によって急速に増えた、貴族や寺社の私有地を何といいますか。", "n": 5, "a": "荘園", "l": "", "practice": false, "p": 1}, {"q": "何度かの失敗の末、ようやく日本に渡ることに成功し、唐招提寺を建てた唐の高僧はだれですか。", "n": 6, "a": "鑑真", "l": "", "practice": false, "p": 1}, {"q": "仏教の力で国を治めようとして、国ごとに国分寺・国分尼寺を建てるよう命じた天皇はだれですか。", "n": 7, "a": "聖武天皇", "l": "", "practice": false, "p": 1}, {"q": "仏教の力で国を治めようとした天皇が、都に総国分寺として建てさせた寺を何といいますか。", "n": 8, "a": "東大寺", "l": "", "practice": false, "p": 1}, {"q": "総国分寺にある、天皇の遺品を収めた倉庫の建築様式を何といいますか。", "n": 9, "a": "校倉造", "l": "", "practice": false, "p": 1}, {"q": "平安時代の初めに、東北の蝦夷を平定するため、征夷大将軍に任命されたのはだれですか。", "n": 10, "a": "坂上田村麻呂", "l": "", "practice": false, "p": 1}, {"q": "唐から帰り、天台宗を開いた僧の名前を答えなさい。", "n": 11, "a": "最澄", "l": "", "practice": false, "p": 1}, {"q": "唐から帰り、真言宗を開いた僧の名前を答えなさい。", "n": 12, "a": "空海", "l": "", "practice": false, "p": 1}, {"q": "藤原氏などの貴族が持っていた、税を払わなくてよい権利を何といいますか。", "n": 13, "a": "不輸の権", "l": "", "practice": false, "p": 1}, {"q": "藤原氏などの貴族が持っていた、役人の立ち入りを断る権利を何といいますか。", "n": 14, "a": "不入の権", "l": "", "practice": false, "p": 1}, {"q": "935年に、関東で反乱を起こし、「新皇」と名のった武士はだれですか。", "n": 15, "a": "平将門", "l": "", "practice": false, "p": 1}, {"q": "939年に、瀬戸内海で反乱を起こした海賊はだれですか。", "n": 16, "a": "藤原純友", "l": "", "practice": false, "p": 1}, {"q": "1156年におきた天皇と上皇の争いを何といいますか。", "n": 17, "a": "保元の乱", "l": "", "practice": false, "p": 1}, {"q": "1159年におきた源氏と平氏の争いを何といいますか。", "n": 18, "a": "平治の乱", "l": "", "practice": false, "p": 1}, {"q": "1167年に朝廷から、武士としてはじめて太政大臣に任じられた人物はだれですか。", "n": 19, "a": "平清盛", "l": "", "practice": false, "p": 1}, {"q": "室町幕府成立までの戦乱のさなか、守護から成長し、領地を拡大していった大名を何といいますか。", "n": 20, "a": "守護大名", "l": "", "practice": false, "p": 1}, {"q": "戦国大名が自分の領国の武士や農民を治めるために出した決まりを何といいますか。", "n": 21, "a": "分国法", "l": "", "practice": false, "p": 1}, {"q": "1639年に鎖国を完成させた将軍はだれですか。", "n": 22, "a": "徳川家光", "l": "", "practice": true, "p": 1}, {"q": "東海道の様子を生き生きと描いた「東海道五十三次」の作者はだれですか。", "n": 23, "a": "歌川広重（安藤広重）", "l": "", "practice": false, "p": 1}, {"q": "幕末当時の最大の貿易相手国を答えなさい。", "n": 24, "a": "イギリス", "l": "", "practice": true, "p": 1}, {"q": "1871年に女子留学生としてアメリカに渡り、帰国後に女子英学塾を創設した人物はだれですか。", "n": 25, "a": "津田梅子", "l": "", "practice": false, "p": 1}, {"q": "現在の埼玉県深谷市出身で、「日本資本主義の父」とよばれる人物はだれですか。", "n": 26, "a": "渋沢栄一", "l": "", "practice": false, "p": 1}, {"q": "早稲田大学の前身となる東京専門学校を創設し、総理大臣も務めた人物はだれですか。", "n": 27, "a": "大隈重信", "l": "", "practice": false, "p": 1}, {"q": "破傷風の治療法を発見した世界的な医学者はだれですか。", "n": 28, "a": "北里柴三郎", "l": "", "practice": false, "p": 1}, {"q": "黄熱病の研究を行い、自らも研究中に病に倒れた医学者はだれですか。", "n": 29, "a": "野口英世", "l": "", "practice": false, "p": 1}, {"q": "「吾輩は猫である」、「坊っちゃん」などを書いた明治時代を代表する作家はだれですか。", "n": 30, "a": "夏目漱石", "l": "", "practice": false, "p": 1}, {"q": "「たけくらべ」が代表作である、明治時代の女流文学者はだれですか。", "n": 31, "a": "樋口一葉", "l": "", "practice": false, "p": 1}, {"q": "第一次世界大戦中の1915年に、日本が中国に対して突きつけたさまざまな要求のことを何といいますか。", "n": 32, "a": "二十一か条の要求", "l": "", "practice": false, "p": 1}, {"q": "第一次世界大戦中に、軍需品の大量注文によってにわかに大金持ちになった人々を何といいますか。", "n": 33, "a": "成金", "l": "", "practice": false, "p": 1}, {"q": "1918年に富山の漁村の主婦たちが起こしたことがきっかけで全国的に広まった騒動を何といいますか。", "n": 34, "a": "米騒動", "l": "", "practice": false, "p": 1}, {"q": "1918年の全国的に広がった暴動を受けて内閣総理大臣になった人物はだれですか。", "n": 35, "a": "原敬", "l": "", "practice": false, "p": 1}, {"q": "普通選挙を求めて運動を起こし、のちに「憲政の神様」とよばれた人物はだれですか。", "n": 36, "a": "尾崎行雄", "l": "", "practice": false, "p": 1}, {"q": "『民本主義』を唱えた東大の教授はだれですか。", "n": 37, "a": "吉野作造", "l": "", "practice": false, "p": 1}, {"q": "1919年に締結された第一次世界大戦の講和条約を何といいますか。", "n": 38, "a": "ベルサイユ条約", "l": "", "practice": false, "p": 1}, {"q": "第一次世界大戦後の1920年に、世界の平和を守るために発足した国際的な機関を何といいますか。", "n": 39, "a": "国際連盟", "l": "", "practice": false, "p": 1}, {"q": "1925年に成立した普通選挙法で選挙権が認められたのは、どのような人々ですか。", "n": 40, "a": "満25歳以上のすべての男子", "l": "", "practice": false, "p": 1}, {"q": "1925年に成立した社会主義者などを取り締まるための法律を何といいますか。", "n": 41, "a": "治安維持法", "l": "", "practice": false, "p": 1}, {"q": "1925年に、日本で放送が開始されたものは何ですか。", "n": 42, "a": "ラジオ", "l": "", "practice": false, "p": 1}, {"q": "部落差別を無くすために、1922年に京都で結成された団体は何ですか。", "n": 43, "a": "全国水平社", "l": "", "practice": false, "p": 1}, {"q": "女性の地位向上や婦人参政権を求めて、雑誌「青鞜」の創刊をした人物はだれですか。", "n": 44, "a": "平塚らいてう（雷鳥）", "l": "", "practice": false, "p": 1}, {"q": "1929年にアメリカではじまり世界に広がっていった、深刻な不景気を何といいますか。", "n": 45, "a": "世界恐慌", "l": "", "practice": false, "p": 1}, {"q": "不景気の中、銀行や企業を吸収して大きくなった大企業を何といいますか。", "n": 46, "a": "財閥", "l": "", "practice": false, "p": 1}, {"q": "豊かな資源を求めて、「日本の生命線」といわれた中国東北部のことを何といいますか。", "n": 47, "a": "満州", "l": "", "practice": false, "p": 1}, {"q": "1931年に日本軍が鉄道を爆破したことをきっかけに中国東北部を攻撃した事件をなんといいますか。", "n": 48, "a": "満州事変", "l": "", "practice": false, "p": 1}, {"q": "1931年に日本軍が起こした事件の調査のために国際連盟から派遣された調査団を何といいますか。", "n": 49, "a": "リットン調査団", "l": "", "practice": false, "p": 1}];
        // QUESTIONS_DATA_END

        let questions = [];
        let currentIndex = 0;
        let results = [];

        const STORAGE_KEY = 'kanji_test_progress';

        const fileInput = document.getElementById('file-input');
        const screenUpload = document.getElementById('screen-upload');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const questionText = document.getElementById('question-text');
        const answerBox = document.getElementById('answer-box');
        const checkBtn = document.getElementById('check-btn');
        const practiceBtn = document.getElementById('practice-btn');
        const practiceAnswerBox = document.getElementById('practice-answer-box');
        const practiceExplanationBox = document.getElementById('practice-explanation-box');
        const backBtn = document.getElementById('back-btn');
        const judgeContainer = document.getElementById('judge-container');
        const progressText = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');
        const resumeModal = document.getElementById('resume-modal');

        // Initial check for embedded data
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Check embedded questions...");
            if (typeof embeddedQuestions !== 'undefined' && embeddedQuestions && Array.isArray(embeddedQuestions) && embeddedQuestions.length > 0) {
                console.log("Found embedded questions:", embeddedQuestions.length);
                questions = embeddedQuestions;
                checkResume();
            } else {
                console.log("No embedded questions found.");
            }
        });

        function checkResume() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    console.error("Resume error:", e);
                    clearProgress ();
                 }
            }
            startQuiz(true);
        }

         function  saveProgress() {
            const state = {
                index: currentIndex,
                results: results,
                total: questions.length
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // RGB Color Priority logic
        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150 && (g < 200 || (r < 100 && g > 150 && b > 200))) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {
                    type: 'array',
                    cellStyles: true
                });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) {
                    alert("「予定表」シートが見つかりませんでした。");
                    return;
                }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })],
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })],
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })],
                        cellQ = worksheet[XLSX.utils.encode_cell({ r: r, c: 16 })];
                    if (!cellI || !cellK) continue;
                    const q = cellI.v,
                        numVal = cellJ ? cellJ.v : 0,
                        num = isNaN(parseInt(numVal)) ? 0 : parseInt(numVal),
                        a = cellK.v,
                        l = cellL ? String(cellL.v).trim() : "",
                        qVal = cellQ ? cellQ.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    if (!q || !a || q === "問題文" || a === "解答") continue;
                    rawData.push({
                        q: q,
                        n: num,
                        a: a,
                        l: l,
                        practice: practice,
                        p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) {
                    alert("問題が見つかりませんでした。");
                    return;
                }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) {
                currentIndex = 0;
                results = [];
                clearProgress();
            }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            questionText.innerText = q.q;
            
            // 文字数に応じてフォントサイズを動的に変更
            const len = q.q.length;
            if (len < 15) {
                questionText.style.fontSize = "2.5rem";
            } else if (len < 30) {
                questionText.style.fontSize = "1.8rem";
            } else if (len < 60) {
                questionText.style.fontSize = "1.4rem";
            } else {
                questionText.style.fontSize = "1.1rem";
            }
            
            answerBox.innerText = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";

            if (q.practice) {
                // 練習モード：解答・解説を即表示
                checkBtn.style.display = "none";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "block";
                practiceAnswerBox.innerText = q.a;
                if (q.l) {
                    practiceExplanationBox.style.display = "block";
                    practiceExplanationBox.innerText = q.l;
                } else {
                    practiceExplanationBox.style.display = "none";
                }
                practiceBtn.style.display = "block";
            } else {
                // 通常モード
                checkBtn.style.display = "block";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "none";
                practiceExplanationBox.style.display = "none";
                practiceBtn.style.display = "none";
            }
        }

        checkBtn.addEventListener('click', () => {
            answerBox.innerText = questions[currentIndex].a;
            checkBtn.style.display = "none";
            judgeContainer.style.display = "flex";
        });

        practiceBtn.addEventListener('click', () => {
            recordResult('練習');
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('maru-btn').addEventListener('click', () => recordResult('○'));
        document.getElementById('batsu-btn').addEventListener('click', () => recordResult('×'));

        function recordResult(judge) {
            results.push({
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    openLine(text);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                openLine(text);
            } catch (e) {
                alert("コピー失敗");
            }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => {
                alert("結果をコピーしました！LINEに貼り付けて送ってください。");
            }, 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
</body>
