<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社会テストアプリ</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 90%;
            max-width: 500px;
            min-height: 200px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            margin-bottom: 30px;
            border: 4px solid #f0f0f0;
            position: relative;
        }

        #question-text {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        #answer-box {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 80%;
            max-width: 300px;
        }

        .big-btn:active {
            transform: translateY(4px);
        }

        #check-btn {
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
        }

        .judge-btns {
            display: none;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .judge-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-sizing: border-box;
        }

        #maru-btn {
            background-color: var(--maru-color);
            box-shadow: var(--maru-shadow);
        }

        #batsu-btn {
            background-color: var(--batsu-color);
            box-shadow: var(--batsu-shadow);
        }

        .secondary-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 70px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Modal for Resume */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }

        /* Practice mode */
        #practice-answer-box {
            font-size: 3rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        #practice-explanation-box {
            font-size: 1rem;
            color: #666;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 16px;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        #practice-btn {
            background-color: #9c27b0;
            color: white;
            box-shadow: 0 4px 0 #6a1b7a;
            height: 70px;
        }

        /* Animation */
        .fade-in {
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>社会テストアプリ</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>

        <div id="answer-box"></div>

        <!-- 練習モード用：即時表示の解答と解説 -->
        <div id="practice-answer-box"></div>
        <div id="practice-explanation-box"></div>

        <button id="check-btn" class="big-btn">答えあわせ</button>
        <button id="practice-btn" class="big-btn" style="display:none;">練習しました</button>

        <div class="judge-btns" id="judge-container">
            <button id="maru-btn" class="judge-btn">○</button>
            <button id="batsu-btn" class="judge-btn">×</button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "663年に朝廷が百済と協力して戦った結果、唐・新羅の連合軍に敗れた戦いを何といいますか。", "n": 1, "a": "白村江の戦い", "l": "", "practice": false, "p": 1}, {"q": "672年に天皇の後継ぎをめぐり争った、天皇の弟の名前を答えなさい。", "n": 2, "a": "大海人皇子", "l": "", "practice": false, "p": 1}, {"q": "672年に起きた争いに勝利した人物は、即位して何天皇になりましたか。", "n": 3, "a": "天武天皇", "l": "", "practice": false, "p": 1}, {"q": "薬師寺東塔などに代表される、唐の初期の影響を受けた活気あふれる文化を何文化といいますか。", "n": 4, "a": "白鳳文化", "l": "", "practice": false, "p": 1}, {"q": "キトラ古墳と同じ時期につくられた古墳で、壁画が確認された古墳を何古墳といいますか。", "n": 5, "a": "高松塚古墳", "l": "", "practice": false, "p": 1}, {"q": "都で10日間働くかわりに布を納める税", "n": 6, "a": "②庸", "l": "", "practice": false, "p": 1}, {"q": "701年に定められたきまりをつくった、蘇我氏を滅ぼした人物の子はだれですか。", "n": 7, "a": "藤原不比等", "l": "", "practice": false, "p": 1}, {"q": "723年に定められた、土地に関する法律を何といいますか。", "n": 8, "a": "三世一身の法", "l": "", "practice": false, "p": 1}, {"q": "奈良時代中期の、唐の強い影響を受けた仏教文化を何文化といいますか。", "n": 9, "a": "天平文化", "l": "", "practice": false, "p": 1}, {"q": "後鳥羽上皇が政治の実権を取り戻そうとして事件を起こしたときの幕府の最高責任者はだれですか。", "n": 10, "a": "北条義時", "l": "", "practice": true, "p": 1}, {"q": "東大寺南大門や円覚寺舎利殿などに代表される、力強く素朴な武士の文化を何といいますか。", "n": 11, "a": "鎌倉文化", "l": "", "practice": false, "p": 1}, {"q": "室町幕府の政治のしくみのうえで、将軍を補佐する立場にあったのは何という役職ですか。", "n": 12, "a": "管領", "l": "", "practice": false, "p": 1}, {"q": "室町幕府の3代将軍のころの文化を何文化といいますか。", "n": 13, "a": "北山文化", "l": "", "practice": false, "p": 1}, {"q": "室町幕府成立までの戦乱のさなか、守護から成長し、領地を拡大していった大名を何といいますか。", "n": 14, "a": "守護大名", "l": "", "practice": false, "p": 1}, {"q": "戦国大名が自分の領国の武士や農民を治めるために出した決まりを何といいますか。", "n": 15, "a": "分国法", "l": "", "practice": false, "p": 1}, {"q": "墨の濃淡で表現される絵画の技法を明にわたって学んだ人物はだれですか。", "n": 16, "a": "雪舟", "l": "", "practice": true, "p": 1}, {"q": "1560年に織田信長が今川義元を破った戦いを何といいますか。", "n": 17, "a": "桶狭間の戦い", "l": "", "practice": false, "p": 1}, {"q": "1575年に織田信長が武田勝頼の軍勢を破った戦いを何といいますか。", "n": 18, "a": "長篠の戦い", "l": "", "practice": false, "p": 1}, {"q": "織田信長が安土城の城下町などで商工業の発展のために行った政策を何といいますか。", "n": 19, "a": "楽市・楽座", "l": "", "practice": false, "p": 1}, {"q": "織田信長が自分の領国などで人や物の流れを活性化するために廃止したものは何ですか。", "n": 20, "a": "関所", "l": "", "practice": false, "p": 1}, {"q": "1582年に織田信長が家臣である明智光秀によって自害に追いこまれた出来事を何といいますか。", "n": 21, "a": "本能寺の変", "l": "", "practice": false, "p": 1}, {"q": "豊臣秀吉がものさしやますの大きさを統一し、土地の耕作者を定めた政策を漢字4字で何といいますか。", "n": 22, "a": "太閤検地", "l": "", "practice": false, "p": 1}, {"q": "豊臣秀吉が一揆の防止のために、農民達から刀・鉄砲・槍などをとりあげたことを何といいますか。", "n": 23, "a": "刀狩（刀狩令）", "l": "", "practice": false, "p": 1}, {"q": "1592年と1597年に豊臣秀吉の命令で兵が送られた国はどこですか。", "n": 24, "a": "朝鮮", "l": "", "practice": false, "p": 1}, {"q": "カステラやタバコなどのような、スペイン人やポルトガル人が伝えた貿易を何といいますか。", "n": 25, "a": "南蛮貿易", "l": "", "practice": false, "p": 1}, {"q": "織田信長によって琵琶湖のほとりにつくられた城の名前を答えなさい。", "n": 26, "a": "安土城", "l": "", "practice": false, "p": 1}, {"q": "その美しさから「白鷺城」とよばれた、世界文化遺産にも登録されている城の名前を答えなさい。", "n": 27, "a": "姫路城", "l": "", "practice": false, "p": 1}, {"q": "「唐獅子図屏風」を描いた人物はだれですか。", "n": 28, "a": "狩野永徳", "l": "", "practice": false, "p": 1}, {"q": "出雲の国の阿国によってはじめられた、踊りを交えた芝居を何といいますか。", "n": 29, "a": "かぶき踊り", "l": "", "practice": false, "p": 1}, {"q": "秀吉に仕えた堺の商人で茶道を大成させた人物はだれですか。", "n": 30, "a": "千利休", "l": "", "practice": false, "p": 1}, {"q": "五奉行の一人であり、関ヶ原の戦いの西軍の中心人物はだれですか。", "n": 31, "a": "石田三成", "l": "", "practice": false, "p": 1}, {"q": "関ヶ原の戦いに勝利し、江戸に幕府を開いた人物はだれですか。", "n": 32, "a": "徳川家康", "l": "", "practice": false, "p": 1}, {"q": "江戸幕府の役職の一つで、将軍を補佐し、政治全般をみる役職を何といいますか。", "n": 33, "a": "老中", "l": "", "practice": false, "p": 1}, {"q": "江戸幕府において、緊急時に置かれる将軍を補佐する最高職を何といいますか。", "n": 34, "a": "大老", "l": "", "practice": false, "p": 1}, {"q": "大名の統制のため、1615年に出された法律を何といいますか。", "n": 35, "a": "武家諸法度", "l": "", "practice": false, "p": 1}, {"q": "妻子を人質として江戸に住まわせ、大名は1年おきに領地と江戸の往復を定めた制度を何といいますか。", "n": 36, "a": "参勤交代", "l": "", "practice": false, "p": 1}, {"q": "3種類に分けられる大名のうち、関ヶ原の戦いの前から家来だった大名を何といいますか。", "n": 37, "a": "譜代（大名）", "l": "", "practice": false, "p": 1}, {"q": "3種類に分けられる大名のうち、関ヶ原の戦いの後に家来になった大名を何といいますか。", "n": 38, "a": "外様（大名）", "l": "", "practice": false, "p": 1}, {"q": "農民たちを五戸で一組にして、連帯責任と互いの監視を行わせた制度を何といいますか。", "n": 39, "a": "五人組", "l": "", "practice": false, "p": 1}, {"q": "海外渡航の許可証を与えられた大名や商人による、東南アジアを中心とした貿易を何貿易といいますか。", "n": 40, "a": "朱印船貿易", "l": "", "practice": false, "p": 1}, {"q": "江戸時代初期の東南アジアとの貿易の結果、アジア各地に作られた日本人の居住地区を何といいますか。", "n": 41, "a": "日本町", "l": "", "practice": false, "p": 1}, {"q": "シャムの王に仕えて、アユタヤで活躍した日本人はだれですか。", "n": 42, "a": "山田長政", "l": "", "practice": false, "p": 1}, {"q": "朝鮮出兵以後途絶えていた国交が回復し、将軍が替わるたびにやってきた朝鮮の使者を何といいますか。", "n": 43, "a": "朝鮮通信使", "l": "", "practice": false, "p": 1}, {"q": "1624年に貿易が禁止されたヨーロッパの国名を答えなさい。", "n": 44, "a": "スペイン", "l": "", "practice": false, "p": 1}, {"q": "1637年に九州地方で起きた、キリスト教徒や農民の大規模な反乱を何といいますか。", "n": 45, "a": "島原・天草一揆", "l": "", "practice": false, "p": 1}, {"q": "1637年に九州地方で起きた、キリスト教徒や農民による反乱の中心人物はだれですか。", "n": 46, "a": "天草四郎", "l": "", "practice": false, "p": 1}, {"q": "禁止していたキリスト教徒の信徒を見つけるために絵や像を用いた方法を何といいますか。", "n": 47, "a": "絵踏", "l": "", "practice": false, "p": 1}, {"q": "1639年に貿易が禁止されたヨーロッパの国名を答えなさい。", "n": 48, "a": "ポルトガル", "l": "", "practice": false, "p": 1}, {"q": "1639年に鎖国を完成させた将軍はだれですか。", "n": 49, "a": "徳川家光", "l": "", "practice": false, "p": 1}, {"q": "1641年にオランダ商館が置かれた長崎にある扇形の人工島を何といいますか。", "n": 50, "a": "出島", "l": "", "practice": false, "p": 1}, {"q": "表向きは中国の支配下にある琉球王国を支配下に置いた藩はどこですか。", "n": 51, "a": "薩摩藩", "l": "", "practice": false, "p": 1}, {"q": "朝鮮との国交回復に尽力し、仲立ちとなっていた藩はどこですか。", "n": 52, "a": "対馬藩", "l": "", "practice": false, "p": 1}, {"q": "江戸時代の身分制度の上で、全人口の80%以上を占めていたのはどのような人々ですか。", "n": 53, "a": "百姓（農民）", "l": "", "practice": false, "p": 1}, {"q": "江戸時代の五街道は江戸のどこを起点とされていましたか。", "n": 54, "a": "日本橋", "l": "", "practice": false, "p": 1}, {"q": "五街道の中で箱根を通って、江戸と京都を結ぶ街道を何といいますか。", "n": 55, "a": "東海道", "l": "", "practice": false, "p": 1}, {"q": "五街道の中で、江戸から下諏訪、美濃を経由して草津までを結んだ街道を何といいますか。", "n": 56, "a": "中山道", "l": "", "practice": false, "p": 1}, {"q": "街道につくられて、移動する旅人をとめることで発展した町を何といいますか。", "n": 57, "a": "宿場町", "l": "", "practice": false, "p": 1}, {"q": "5代将軍徳川綱吉が出した、極端な動物愛護を命じる法律を何といいますか。", "n": 58, "a": "生類憐みの令", "l": "", "practice": false, "p": 1}, {"q": "6、7代将軍に仕え、「正徳の治」とよばれる政治改革を行った儒学者はだれですか。", "n": 59, "a": "新井白石", "l": "", "practice": false, "p": 1}, {"q": "5代将軍綱吉のころの、上方を中心にさかえた人情味豊かな町人文化を何文化といいますか。", "n": 60, "a": "元禄文化", "l": "", "practice": false, "p": 1}, {"q": "「日本永代蔵」「世間胸算用」などの浮世草子とよばれる小説の作者はだれですか。", "n": 61, "a": "井原西鶴", "l": "", "practice": false, "p": 1}, {"q": "「国姓爺合戦」「曽根崎心中」などの人形浄瑠璃の脚本家はだれですか。", "n": 62, "a": "近松門左衛門", "l": "", "practice": false, "p": 1}, {"q": "東北を旅して、紀行文「おくのほそ道」を書いた俳人はだれですか。", "n": 63, "a": "松尾芭蕉", "l": "", "practice": false, "p": 1}, {"q": "江戸時代に庶民にも流行した「見返り美人図」などの木版画を何といいますか。", "n": 64, "a": "浮世絵", "l": "", "practice": false, "p": 1}, {"q": "1669年に、松前藩の圧政に対して立ち上がり、反乱をおこしたアイヌの族長はだれですか。", "n": 65, "a": "シャクシャイン", "l": "", "practice": false, "p": 1}, {"q": "徳川吉宗が行った政治改革を何といいますか。", "n": 66, "a": "享保の改革", "l": "", "practice": false, "p": 1}];
        // QUESTIONS_DATA_END

        let questions = [];
        let currentIndex = 0;
        let results = [];

        const STORAGE_KEY = 'kanji_test_progress';

        const fileInput = document.getElementById('file-input');
        const screenUpload = document.getElementById('screen-upload');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const questionText = document.getElementById('question-text');
        const answerBox = document.getElementById('answer-box');
        const checkBtn = document.getElementById('check-btn');
        const practiceBtn = document.getElementById('practice-btn');
        const practiceAnswerBox = document.getElementById('practice-answer-box');
        const practiceExplanationBox = document.getElementById('practice-explanation-box');
        const backBtn = document.getElementById('back-btn');
        const judgeContainer = document.getElementById('judge-container');
        const progressText = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');
        const resumeModal = document.getElementById('resume-modal');

        // Initial check for embedded data
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Check embedded questions...");
            if (typeof embeddedQuestions !== 'undefined' && embeddedQuestions && Array.isArray(embeddedQuestions) && embeddedQuestions.length > 0) {
                console.log("Found embedded questions:", embeddedQuestions.length);
                questions = embeddedQuestions;
                checkResume();
            } else {
                console.log("No embedded questions found.");
            }
        });

        function checkResume() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    console.error("Resume error:", e);
                    clearProgress ();
                 }
            }
            startQuiz(true);
        }

         function  saveProgress() {
            const state = {
                index: currentIndex,
                results: results,
                total: questions.length
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // RGB Color Priority logic
        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150 && (g < 200 || (r < 100 && g > 150 && b > 200))) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {
                    type: 'array',
                    cellStyles: true
                });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) {
                    alert("「予定表」シートが見つかりませんでした。");
                    return;
                }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })],
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })],
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })],
                        cellQ = worksheet[XLSX.utils.encode_cell({ r: r, c: 16 })];
                    if (!cellI || !cellK) continue;
                    const q = cellI.v,
                        numVal = cellJ ? cellJ.v : 0,
                        num = isNaN(parseInt(numVal)) ? 0 : parseInt(numVal),
                        a = cellK.v,
                        l = cellL ? String(cellL.v).trim() : "",
                        qVal = cellQ ? cellQ.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    if (!q || !a || q === "問題文" || a === "解答") continue;
                    rawData.push({
                        q: q,
                        n: num,
                        a: a,
                        l: l,
                        practice: practice,
                        p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) {
                    alert("問題が見つかりませんでした。");
                    return;
                }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) {
                currentIndex = 0;
                results = [];
                clearProgress();
            }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            questionText.innerText = q.q;
            
            // 文字数に応じてフォントサイズを動的に変更
            const len = q.q.length;
            if (len < 15) {
                questionText.style.fontSize = "2.5rem";
            } else if (len < 30) {
                questionText.style.fontSize = "1.8rem";
            } else if (len < 60) {
                questionText.style.fontSize = "1.4rem";
            } else {
                questionText.style.fontSize = "1.1rem";
            }
            
            answerBox.innerText = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";

            if (q.practice) {
                // 練習モード：解答・解説を即表示
                checkBtn.style.display = "none";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "block";
                practiceAnswerBox.innerText = q.a;
                if (q.l) {
                    practiceExplanationBox.style.display = "block";
                    practiceExplanationBox.innerText = q.l;
                } else {
                    practiceExplanationBox.style.display = "none";
                }
                practiceBtn.style.display = "block";
            } else {
                // 通常モード
                checkBtn.style.display = "block";
                judgeContainer.style.display = "none";
                practiceAnswerBox.style.display = "none";
                practiceExplanationBox.style.display = "none";
                practiceBtn.style.display = "none";
            }
        }

        checkBtn.addEventListener('click', () => {
            answerBox.innerText = questions[currentIndex].a;
            checkBtn.style.display = "none";
            judgeContainer.style.display = "flex";
        });

        practiceBtn.addEventListener('click', () => {
            recordResult('練習');
        });

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('maru-btn').addEventListener('click', () => recordResult('○'));
        document.getElementById('batsu-btn').addEventListener('click', () => recordResult('×'));

        function recordResult(judge) {
            results.push({
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    openLine(text);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                openLine(text);
            } catch (e) {
                alert("コピー失敗");
            }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => {
                alert("結果をコピーしました！LINEに貼り付けて送ってください。");
            }, 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
