<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Choice4 Test App</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #screen-upload {
            justify-content: center;
        }
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 95%;
            max-width: 500px;
            min-height: 120px;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 3px solid #f0f0f0;
            position: relative;
        }

        #answer-box {
            background: #e3f2fd;
            width: 95%;
            max-width: 500px;
            min-height: 60px;
            border-radius: 15px;
            display: none; /* 初期は非表示 */
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1976d2;
            margin: 10px 0;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #bbdefb;
        }

        #question-text {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        /* 選択肢ボタンコンテナ */
        #choice-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 95%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: white;
            border: 3px solid #eee;
            border-bottom: 6px solid #ddd;
            border-radius: 15px;
            padding: 15px 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            box-sizing: border-box;
            word-break: break-all;
            overflow: hidden;
        }

        .choice-btn img {
            max-width: 100%;
            max-height: 100px;
            object-fit: contain;
            pointer-events: none;
        }

        .choice-btn:active {
            transform: translateY(3px);
            border-bottom-width: 3px;
        }

        .choice-btn.correct {
            background-color: var(--maru-color);
            color: white;
            border-color: #388e3c;
            border-bottom-color: #2e7d32;
        }

        .choice-btn.incorrect {
            background-color: var(--batsu-color);
            color: white;
            border-color: #d32f2f;
            border-bottom-color: #c62828;
        }

        .choice-btn.practice-hint {
            border-color: var(--maru-color);
            border-width: 5px;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .choice-btn.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        /* 修正待ち状態のボタン制御 */
        .choice-btn.waiting-correct {
            pointer-events: auto; /* 正解ボタンだけクリック可能にする */
        }

        /* 判定オーバーレイ */
        #judge-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            display: none;
        }

        #judge-overlay.maru {
            color: var(--maru-color);
            display: block;
            animation: popIn 0.6s forwards;
        }

        #judge-overlay.batsu {
            color: var(--batsu-color);
            display: block;
            animation: popIn 0.6s forwards;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
            margin-bottom: 20px;
        }
        .big-btn:active { transform: translateY(4px); }

        .judge-btn-big {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .judge-btn-big:active { transform: translateY(4px); }
        .judge-btn-big.maru { background-color: var(--maru-color); box-shadow: 0 6px 0 #388e3c; }
        .judge-btn-big.batsu { background-color: var(--batsu-color); box-shadow: 0 6px 0 #d32f2f; }

        .secondary-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
            margin-top: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Resume Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }
    </style>
</head>

<body>

    <div id="judge-overlay">○</div>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>Choice4 Test App★</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>
        <div id="answer-box"></div>

        <div id="choice-container">
            <!-- Buttons generated by JS -->
        </div>

        <!-- 自己採点モード用 UI -->
        <div id="self-grade-container" style="display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center;">
            <button id="check-ans-btn" class="big-btn">答えを確認</button>
            <div id="self-judge-btns" style="display: none; gap: 40px; justify-content: center; width: 100%;">
                <button id="self-maru-btn" class="judge-btn-big maru">○</button>
                <button id="self-batsu-btn" class="judge-btn-big batsu">×</button>
            </div>
            <!-- 不正解時の修正ステップ用 -->
            <button id="self-correct-btn" class="choice-btn correct waiting-correct" style="display: none; width: 100%; max-width: 300px; margin: 0 auto; height: 80px;"></button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "大規模な集団生活を行っていたことなど、縄文時代の常識をくつがえした青森県の遺跡を答えなさい。", "n": 1, "a": "三内丸山遺跡", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "周囲を堀でかこんだ環濠集落が発見された、佐賀県にある遺跡を答えなさい。", "n": 2, "a": "吉野ヶ里遺跡", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "収穫した稲の３％を納める税", "n": 3, "a": "①租", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "地方の特産物を納める税", "n": 4, "a": "③調", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "総国分寺にある、天皇の遺品を収めた倉庫の建築様式を何といいますか。", "n": 5, "a": "校倉造", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "朝廷が地方の国司に、その土地の様子や産物などをまとめさせた書物を何といいますか。", "n": 6, "a": "風土記", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "戦国大名が自分の領国の武士や農民を治めるために出した決まりを何といいますか。", "n": 7, "a": "分国法", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1919年に締結された第一次世界大戦の講和条約を何といいますか。", "n": 8, "a": "ベルサイユ条約", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1925年に成立した社会主義者などを取り締まるための法律を何といいますか。", "n": 9, "a": "治安維持法", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1932年に海軍の将校が首相を暗殺する事件がおきました。この事件を何といいますか。", "n": 10, "a": "五・一五事件", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "1937年に日本軍は当時の中国の首都を占領しました。この当時の中国の首都名を答えなさい。", "n": 11, "a": "南京", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "アメリカを中心とする資本主義国と、ソ連を中心とする社会主義国の戦火を交えない対立を何といいますか。", "n": 12, "a": "冷戦", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1949年に誕生した、北京に首都がある社会主義国の正式名を答えなさい。", "n": 13, "a": "中華人民共和国", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1950年に起きた戦争によって日本は大量の軍需品の注文を受け起こった好景気を何といいますか。", "n": 14, "a": "特需景気（朝鮮特需）", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "朝鮮半島の戦争に際して、日本国内の防衛力を高めるため1950年に設立された組織を何といいますか。", "n": 15, "a": "警察予備隊", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "ソ連との国交回復によって、日本の参加が認められた国際的な組織は何ですか。", "n": 16, "a": "国際連合", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "内閣は、国会との信頼関係にもとづいて成立し、国会に対して連帯責任を負います。このようなしくみを何といいますか。", "n": 17, "a": "議院内閣制", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "① 地方自治・情報通信・選挙に関する仕事を行う。", "n": 18, "a": "総務省", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "⑥ 産業・貿易をさかんにする。伝統的工芸品の指定。", "n": 19, "a": "経済産業省", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "⑧ 医療・福祉の発展、労働組合に関する仕事を行う。", "n": 20, "a": "厚生労働省", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "⑩ 日本の平和と独立を守り、国の安全を守る。", "n": 21, "a": "防衛省", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "裁判所は、内閣・国会などの干渉を受けずに独立して裁判を行います。このことを何の独立といいますか。", "n": 22, "a": "司法権の独立", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "選挙のしくみについて定められた法律を何といいますか。", "n": 23, "a": "公職選挙法", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1つの選挙区から当選者を1名選出する選挙制度を何制といいますか。", "n": 24, "a": "小選挙区制", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "政党が獲得した得票数に応じて当選議席数を決める選挙制度を何制といいますか。", "n": 25, "a": "比例代表制", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1996年から衆議院の選挙で取り入れられた、2つの選挙によって議員を選ぶ選挙制度を何制といいますか。", "n": 26, "a": "小選挙区比例代表並立制", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "投票日当日に投票所に行けない人が、投票日以前に投票できる制度を何といいますか。", "n": 27, "a": "期日前投票", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "議員一人あたりの有権者数が選挙区によって異なることによって生じ、有権者一人が持つ一票の重みが不平等になることを何といいますか。", "n": 28, "a": "一票の格差", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "参議院議員選挙は何年に1回行われますか。", "n": 29, "a": "3年", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "内閣をつくり、政権を担当している政党のことを何といいますか。", "n": 30, "a": "与党", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "政権を担当しない政党のことを何といいますか。", "n": 31, "a": "野党", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "複数の政党によってつくられた内閣を何内閣といいますか。", "n": 32, "a": "連立内閣", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "政治や社会問題に対して国民の多くの人たちが持っている共通意見を何といいますか。", "n": 33, "a": "世論", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "一定地域の政治を、住民が自主的に行うこと         // QUESTIONS_DATA_END

        let questions = [];
        let currentIndex = 0;
        let results = [];
        let isJudging = false;
        let isWaitingForCorrection = false;

        const STORAGE_KEY = 'shakai_4taku_progress';

        const fileInput = document.getElementById('file-input');
        const screenUpload = document.getElementById('screen-upload');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const questionText = document.getElementById('question-text');
        const answerBox = document.getElementById('answer-box');
        const choiceContainer = document.getElementById('choice-container');
        const selfGradeContainer = document.getElementById('self-grade-container');
        const selfJudgeBtns = document.getElementById('self-judge-btns');
        const checkAnsBtn = document.getElementById('check-ans-btn');
        const selfMaruBtn = document.getElementById('self-maru-btn');
        const selfBatsuBtn = document.getElementById('self-batsu-btn');
        const selfCorrectBtn = document.getElementById('self-correct-btn');
        const backBtn = document.getElementById('back-btn');
        const progressText = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');
        const resumeModal = document.getElementById('resume-modal');
        const judgeOverlay = document.getElementById('judge-overlay');

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof embeddedQuestions !== 'undefined' && embeddedQuestions && Array.isArray(embeddedQuestions) && embeddedQuestions.length > 0) {
                questions = embeddedQuestions;
                checkResume();
            }
        });

        function checkResume() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    clearProgress();
                }
            }
            startQuiz(true);
        }

        function saveProgress() {
            const state = { index: currentIndex, results: results, total: questions.length };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellStyles: true });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) { alert("「予定表」シートが見つかりませんでした。"); return; }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r + 1; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })], // Question
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],  // Number
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })], // Answer
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })], // Choices
                        cellM = worksheet[XLSX.utils.encode_cell({ r: r, c: 12 })], // Type
                        cellR = worksheet[XLSX.utils.encode_cell({ r: r, c: 17 })]; // Q_Value
                    
                    if (!cellI || !cellK) continue;
                    const q = cellI.v, a = cellK.v,
                        c_val = cellL ? String(cellL.v).trim() : "",
                        type_val = cellM ? String(cellM.v).trim() : "4択",
                        qVal = cellR ? cellR.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    
                    if (!cellJ || cellJ.v === undefined || cellJ.v === null) continue;
                    let num = parseInt(cellJ.v);
                    if (isNaN(num)) continue;
                    if (!q || !a || q === "問題文") continue;
                    
                    rawData.push({
                        q: q, n: num, a: a, t: type_val,
                        choices: c_val ? c_val.split(/[、，,\n]/).map(s => s.trim()).filter(s => s) : [],
                        practice: practice, p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) { alert("問題が見つかりませんでした。"); return; }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) { currentIndex = 0; results = []; clearProgress(); }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            isJudging = false;
            isWaitingForCorrection = false;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            
            // 問題文の画像判定と表示
            let pureText = q.q;
            let questionImgHtml = "";
            const imgMatch = q.q.match(/[a-zA-Z0-9_\-]+\.(jpg|jpeg|png|gif|webp)/i);
            if (imgMatch) {
                const imgFile = imgMatch[0];
                pureText = q.q.replace(imgFile, "").trim();
                questionImgHtml = `<br><img src="image/${imgFile}" style="max-width:100%; max-height:200px; margin-top:10px; border-radius:10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">`;
            }

            questionText.innerHTML = pureText.replace(/<改行>/g, '<br>') + questionImgHtml;
            
            const len = pureText.length;
            questionText.style.fontSize = len < 15 ? "2.2rem" : len < 30 ? "1.6rem" : len < 60 ? "1.3rem" : "1.1rem";
            
            choiceContainer.innerHTML = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";
            answerBox.innerText = "";
            answerBox.style.display = "none";
            judgeOverlay.className = "";

            const isImage = (text) => {
                if (!text || typeof text !== 'string') return false;
                return /\.(jpg|jpeg|png|gif|webp)$/i.test(text.trim());
            };

            const isChoiceMode = (q.t && (q.t.includes("択") || q.t === "選択"));
            
            if (isChoiceMode) {
                // 選択肢モード
                choiceContainer.style.display = "grid";
                selfGradeContainer.style.display = "none";
                
                let displayChoices = [];
                if (q.choices && q.choices.length > 0) {
                    displayChoices = [...q.choices];
                    if (!displayChoices.includes(q.a)) displayChoices[0] = q.a;
                } else {
                    displayChoices = [q.a, "ダミー1", "ダミー2", "ダミー3"];
                }
                shuffleArray(displayChoices);

                const numChoices = displayChoices.length;
                choiceContainer.style.gridTemplateColumns = numChoices === 1 ? "1fr" : "1fr 1fr";
                
                // リセット（元のサイズに戻す）
                choiceContainer.style.flexGrow = "";
                choiceContainer.style.gridAutoRows = "";
                choiceContainer.style.minHeight = "";
                choiceContainer.style.gap = "12px";

                // 選択肢が4つを超える場合のみ、画面内に収めるための縮小レイアウトを適用
                if (numChoices > 4) {
                    choiceContainer.style.flexGrow = "0"; // 伸ばさない
                    choiceContainer.style.gridAutoRows = "minmax(35px, 80px)"; // 基本は元の80pxだが、はみ出す場合のみ35pxまで縮む
                    choiceContainer.style.minHeight = "0";
                    choiceContainer.style.gap = numChoices > 6 ? "8px" : "12px";
                }

                displayChoices.forEach(choiceText => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.setAttribute('data-choice', choiceText);
                    if (q.practice && choiceText === q.a) btn.classList.add('practice-hint');
                    
                    // フォントサイズとボタンサイズの動的調整
                    let fontSize = "1.2rem";
                    if (numChoices > 4) {
                        btn.style.padding = "8px";
                        btn.style.minHeight = "0"; // gridAutoRowsに任せるため解除
                        btn.style.height = "100%";
                    }
                    
                    if (numChoices >= 8) fontSize = "0.9rem";
                    else if (numChoices >= 6) fontSize = "1.0rem";
                    
                    if (choiceText.length > 20) fontSize = "0.8rem";
                    else if (choiceText.length > 10 && fontSize === "1.2rem") fontSize = "1.0rem";
                    
                    btn.style.fontSize = fontSize;
                    
                    if (isImage(choiceText)) {
                        const img = document.createElement('img');
                        img.src = `image/${choiceText.trim()}`;
                        img.style.maxHeight = numChoices >= 6 ? "60px" : "100px";
                        btn.appendChild(img);
                    } else {
                        btn.innerText = choiceText;
                    }
                    
                    btn.onclick = () => handleChoiceClick(choiceText, btn);
                    choiceContainer.appendChild(btn);
                });
            } else {
                // 自己採点モード（空欄または「4択」以外）
                choiceContainer.style.display = "none";
                selfGradeContainer.style.display = "flex";
                checkAnsBtn.style.display = "block";
                selfJudgeBtns.style.display = "none";
                selfCorrectBtn.style.display = "none";
                
                if (q.practice) {
                    answerBox.innerText = q.a;
                    answerBox.style.display = "flex";
                }
            }
        }

        checkAnsBtn.onclick = () => {
            const q = questions[currentIndex];
            if (/\.(jpg|jpeg|png|gif|webp)$/i.test(q.a.trim())) {
                answerBox.innerHTML = `<img src="image/${q.a.trim()}" style="max-height:100px; object-fit:contain;">`;
            } else {
                answerBox.innerText = q.a;
            }
            answerBox.style.display = "flex";
            checkAnsBtn.style.display = "none";
            selfJudgeBtns.style.display = "flex";
        };

        selfMaruBtn.onclick = () => {
            if (isJudging) return;
            isJudging = true;
            showJudgeOverlay(true);
            setTimeout(() => {
                recordResult('○');
            }, 800);
        };

        selfBatsuBtn.onclick = () => {
            if (isJudging) return;
            isJudging = true;
            showJudgeOverlay(false);
            setTimeout(() => {
                recordResult('×');
            }, 800);
        };

        selfCorrectBtn.onclick = () => {
            if (isWaitingForCorrection) {
                recordResult('×');
            }
        };

        function showJudgeOverlay(isCorrect) {
            judgeOverlay.innerText = isCorrect ? "○" : "×";
            judgeOverlay.className = isCorrect ? "maru" : "batsu";
        }

        function handleChoiceClick(selectedText, btn) {
            if (isJudging && !isWaitingForCorrection) return;
            
            const q = questions[currentIndex];
            const isCorrect = (selectedText === q.a);

            if (isWaitingForCorrection) {
                if (isCorrect) {
                    recordResult('×');
                    judgeOverlay.className = "";
                }
                return;
            }

            isJudging = true;

            const buttons = choiceContainer.querySelectorAll('.choice-btn');
            buttons.forEach(b => {
                const bText = b.getAttribute('data-choice');
                b.classList.remove('practice-hint');
                b.classList.add('disabled');
                if (bText === q.a) {
                    b.classList.add('correct');
                    if (!isCorrect) b.classList.add('waiting-correct');
                } else if (b === btn && !isCorrect) {
                    b.classList.add('incorrect');
                }
            });

            showJudgeOverlay(isCorrect);
            
            if (isCorrect) {
                setTimeout(() => {
                    recordResult('○');
                    judgeOverlay.className = "";
                }, 800);
            } else {
                isWaitingForCorrection = true;
            }
        }

        function recordResult(judge) {
            results.push({
                n: questions[currentIndex].n,
                p: questions[currentIndex].p,
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.n} ${res.p} ${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => openLine(text)).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); openLine(text); } catch (e) { alert("コピー失敗"); }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => alert("結果をコピーしました！LINEに貼り付けて送ってください。"), 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
</body>
