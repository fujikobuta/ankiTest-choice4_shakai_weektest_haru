<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Choice4 Test App</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #screen-upload {
            justify-content: center;
        }
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 95%;
            max-width: 500px;
            min-height: 120px;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 3px solid #f0f0f0;
            position: relative;
        }

        #answer-box {
            background: #e3f2fd;
            width: 95%;
            max-width: 500px;
            min-height: 60px;
            border-radius: 15px;
            display: none; /* 初期は非表示 */
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1976d2;
            margin: 10px 0;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #bbdefb;
        }

        #question-text {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        /* 選択肢ボタンコンテナ */
        #choice-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 95%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: white;
            border: 3px solid #eee;
            border-bottom: 6px solid #ddd;
            border-radius: 15px;
            padding: 15px 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            box-sizing: border-box;
            word-break: break-all;
            overflow: hidden;
        }

        .choice-btn img {
            max-width: 100%;
            max-height: 100px;
            object-fit: contain;
            pointer-events: none;
        }

        .choice-btn:active {
            transform: translateY(3px);
            border-bottom-width: 3px;
        }

        .choice-btn.correct {
            background-color: var(--maru-color);
            color: white;
            border-color: #388e3c;
            border-bottom-color: #2e7d32;
        }

        .choice-btn.incorrect {
            background-color: var(--batsu-color);
            color: white;
            border-color: #d32f2f;
            border-bottom-color: #c62828;
        }

        .choice-btn.practice-hint {
            border-color: var(--maru-color);
            border-width: 5px;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .choice-btn.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        /* 修正待ち状態のボタン制御 */
        .choice-btn.waiting-correct {
            pointer-events: auto; /* 正解ボタンだけクリック可能にする */
        }

        /* 判定オーバーレイ */
        #judge-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            display: none;
        }

        #judge-overlay.maru {
            color: var(--maru-color);
            display: block;
            animation: popIn 0.6s forwards;
        }

        #judge-overlay.batsu {
            color: var(--batsu-color);
            display: block;
            animation: popIn 0.6s forwards;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
            margin-bottom: 20px;
        }
        .big-btn:active { transform: translateY(4px); }

        .judge-btn-big {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .judge-btn-big:active { transform: translateY(4px); }
        .judge-btn-big.maru { background-color: var(--maru-color); box-shadow: 0 6px 0 #388e3c; }
        .judge-btn-big.batsu { background-color: var(--batsu-color); box-shadow: 0 6px 0 #d32f2f; }

        .secondary-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
            margin-top: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Resume Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }
    </style>
</head>

<body>

    <div id="judge-overlay">○</div>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>Choice4 Test App★</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>
        <div id="answer-box"></div>

        <div id="choice-container">
            <!-- Buttons generated by JS -->
        </div>

        <!-- 自己採点モード用 UI -->
        <div id="self-grade-container" style="display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center;">
            <button id="check-ans-btn" class="big-btn">答えを確認</button>
            <div id="self-judge-btns" style="display: none; gap: 40px; justify-content: center; width: 100%;">
                <button id="self-maru-btn" class="judge-btn-big maru">○</button>
                <button id="self-batsu-btn" class="judge-btn-big batsu">×</button>
            </div>
            <!-- 不正解時の修正ステップ用 -->
            <button id="self-correct-btn" class="choice-btn correct waiting-correct" style="display: none; width: 100%; max-width: 300px; margin: 0 auto; height: 80px;"></button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "豪族たちをまとめて大和政権を成立させた、最高権力者を何といいますか。", "n": 1, "a": "大王", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "倭の五王の一人といわれる王の名前が刻まれた鉄剣が出土した、埼玉県にある古墳を答えなさい。", "n": 2, "a": "稲荷山古墳", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "現在の礼儀作法のもととなった、中国の孔子によって開かれた宗教を何といいますか。", "n": 3, "a": "儒教", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "大陸から伝わった宗教を日本に受け入れるかどうかで、豪族の物部氏と激しく対立した豪族は何氏ですか。", "n": 4, "a": "蘇我氏", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "蘇我氏を滅ぼし、後に天皇となった人物はだれですか。", "n": 5, "a": "中大兄皇子", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "鎌倉時代には西日本に、室町時代に関東まで広まった、米の収穫の後に麦をまく農業を何といいますか。", "n": 6, "a": "二毛作", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "織田信長が安土城の城下町などで商工業の発展のために行った政策を何といいますか。", "n": 7, "a": "楽市・楽座", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1582年に織田信長が家臣である明智光秀によって自害に追いこまれた出来事を何といいますか。", "n": 8, "a": "本能寺の変", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "豊臣秀吉がものさしやますの大きさを統一し、土地の耕作者を定めた政策を漢字4字で何といいますか。", "n": 9, "a": "太閤検地", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "豊臣秀吉が一揆の防止のために、農民達から刀・鉄砲・槍などをとりあげたことを何といいますか。", "n": 10, "a": "刀狩（刀狩令）", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1592年と1597年に豊臣秀吉の命令で兵が送られた国はどこですか。", "n": 11, "a": "朝鮮", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "カステラやタバコなどのような、スペイン人やポルトガル人が伝えた貿易を何といいますか。", "n": 12, "a": "南蛮貿易", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "徳川吉宗が行った政治改革を何といいますか。", "n": 13, "a": "享保の改革", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸時代に開発された農具で、深く耕すための道具を何といいますか。", "n": 14, "a": "備中ぐわ", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸時代の同業者同士の組合のことを何といいますか。", "n": 15, "a": "株仲間", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "1840年にイギリスと清の間で起こり、イギリスが勝利した戦争を何といいますか。", "n": 16, "a": "アヘン戦争", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "杉田玄白・前野良沢らが中心になり、             const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    clearProgress();
                }
            }
            startQuiz(true);
        }

        function saveProgress() {
            const state = { index: currentIndex, results: results, total: questions.length };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellStyles: true });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) { alert("「予定表」シートが見つかりませんでした。"); return; }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r + 1; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })], // Question
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],  // Number
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })], // Answer
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })], // Choices
                        cellM = worksheet[XLSX.utils.encode_cell({ r: r, c: 12 })], // Type
                        cellR = worksheet[XLSX.utils.encode_cell({ r: r, c: 17 })]; // Q_Value
                    
                    if (!cellI || !cellK) continue;
                    const q = cellI.v, a = cellK.v,
                        c_val = cellL ? String(cellL.v).trim() : "",
                        type_val = cellM ? String(cellM.v).trim() : "4択",
                        qVal = cellR ? cellR.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    
                    if (!cellJ || cellJ.v === undefined || cellJ.v === null) continue;
                    let num = parseInt(cellJ.v);
                    if (isNaN(num)) continue;
                    if (!q || !a || q === "問題文") continue;
                    
                    rawData.push({
                        q: q, n: num, a: a, t: type_val,
                        choices: c_val ? c_val.split(/[、，,\n]/).map(s => s.trim()).filter(s => s) : [],
                        practice: practice, p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) { alert("問題が見つかりませんでした。"); return; }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) { currentIndex = 0; results = []; clearProgress(); }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            isJudging = false;
            isWaitingForCorrection = false;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            
            // 問題文の画像判定と表示
            let pureText = q.q;
            let questionImgHtml = "";
            const imgMatch = q.q.match(/[a-zA-Z0-9_\-]+\.(jpg|jpeg|png|gif|webp)/i);
            if (imgMatch) {
                const imgFile = imgMatch[0];
                pureText = q.q.replace(imgFile, "").trim();
                questionImgHtml = `<br><img src="image/${imgFile}" style="max-width:100%; max-height:200px; margin-top:10px; border-radius:10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">`;
            }

            questionText.innerHTML = pureText.replace(/<改行>/g, '<br>') + questionImgHtml;
            
            const len = pureText.length;
            questionText.style.fontSize = len < 15 ? "2.2rem" : len < 30 ? "1.6rem" : len < 60 ? "1.3rem" : "1.1rem";
            
            choiceContainer.innerHTML = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";
            answerBox.innerText = "";
            answerBox.style.display = "none";
            judgeOverlay.className = "";

            const isImage = (text) => {
                if (!text || typeof text !== 'string') return false;
                return /\.(jpg|jpeg|png|gif|webp)$/i.test(text.trim());
            };

            const isChoiceMode = (q.t && (q.t.includes("択") || q.t === "選択"));
            
            if (isChoiceMode) {
                // 選択肢モード
                choiceContainer.style.display = "grid";
                selfGradeContainer.style.display = "none";
                
                let displayChoices = [];
                if (q.choices && q.choices.length > 0) {
                    displayChoices = [...q.choices];
                    if (!displayChoices.includes(q.a)) displayChoices[0] = q.a;
                } else {
                    displayChoices = [q.a, "ダミー1", "ダミー2", "ダミー3"];
                }
                shuffleArray(displayChoices);

                const numChoices = displayChoices.length;
                choiceContainer.style.gridTemplateColumns = numChoices === 1 ? "1fr" : "1fr 1fr";
                
                // リセット（元のサイズに戻す）
                choiceContainer.style.flexGrow = "";
                choiceContainer.style.gridAutoRows = "";
                choiceContainer.style.minHeight = "";
                choiceContainer.style.gap = "12px";

                // 選択肢が4つを超える場合のみ、画面内に収めるための縮小レイアウトを適用
                if (numChoices > 4) {
                    choiceContainer.style.flexGrow = "0"; // 伸ばさない
                    choiceContainer.style.gridAutoRows = "minmax(35px, 80px)"; // 基本は元の80pxだが、はみ出す場合のみ35pxまで縮む
                    choiceContainer.style.minHeight = "0";
                    choiceContainer.style.gap = numChoices > 6 ? "8px" : "12px";
                }

                displayChoices.forEach(choiceText => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.setAttribute('data-choice', choiceText);
                    if (q.practice && choiceText === q.a) btn.classList.add('practice-hint');
                    
                    // フォントサイズとボタンサイズの動的調整
                    let fontSize = "1.2rem";
                    if (numChoices > 4) {
                        btn.style.padding = "8px";
                        btn.style.minHeight = "0"; // gridAutoRowsに任せるため解除
                        btn.style.height = "100%";
                    }
                    
                    if (numChoices >= 8) fontSize = "0.9rem";
                    else if (numChoices >= 6) fontSize = "1.0rem";
                    
                    if (choiceText.length > 20) fontSize = "0.8rem";
                    else if (choiceText.length > 10 && fontSize === "1.2rem") fontSize = "1.0rem";
                    
                    btn.style.fontSize = fontSize;
                    
                    if (isImage(choiceText)) {
                        const img = document.createElement('img');
                        img.src = `image/${choiceText.trim()}`;
                        img.style.maxHeight = numChoices >= 6 ? "60px" : "100px";
                        btn.appendChild(img);
                    } else {
                        btn.innerText = choiceText;
                    }
                    
                    btn.onclick = () => handleChoiceClick(choiceText, btn);
                    choiceContainer.appendChild(btn);
                });
            } else {
                // 自己採点モード（空欄または「4択」以外）
                choiceContainer.style.display = "none";
                selfGradeContainer.style.display = "flex";
                checkAnsBtn.style.display = "block";
                selfJudgeBtns.style.display = "none";
                selfCorrectBtn.style.display = "none";
                
                if (q.practice) {
                    answerBox.innerText = q.a;
                    answerBox.style.display = "flex";
                }
            }
        }

        checkAnsBtn.onclick = () => {
            const q = questions[currentIndex];
            if (/\.(jpg|jpeg|png|gif|webp)$/i.test(q.a.trim())) {
                answerBox.innerHTML = `<img src="image/${q.a.trim()}" style="max-height:100px; object-fit:contain;">`;
            } else {
                answerBox.innerText = q.a;
            }
            answerBox.style.display = "flex";
            checkAnsBtn.style.display = "none";
            selfJudgeBtns.style.display = "flex";
        };

        selfMaruBtn.onclick = () => {
            if (isJudging) return;
            isJudging = true;
            showJudgeOverlay(true);
            setTimeout(() => {
                recordResult('○');
            }, 800);
        };

        selfBatsuBtn.onclick = () => {
            if (isJudging) return;
            isJudging = true;
            showJudgeOverlay(false);
            setTimeout(() => {
                recordResult('×');
            }, 800);
        };

        selfCorrectBtn.onclick = () => {
            if (isWaitingForCorrection) {
                recordResult('×');
            }
        };

        function showJudgeOverlay(isCorrect) {
            judgeOverlay.innerText = isCorrect ? "○" : "×";
            judgeOverlay.className = isCorrect ? "maru" : "batsu";
        }

        function handleChoiceClick(selectedText, btn) {
            if (isJudging && !isWaitingForCorrection) return;
            
            const q = questions[currentIndex];
            const isCorrect = (selectedText === q.a);

            if (isWaitingForCorrection) {
                if (isCorrect) {
                    recordResult('×');
                    judgeOverlay.className = "";
                }
                return;
            }

            isJudging = true;

            const buttons = choiceContainer.querySelectorAll('.choice-btn');
            buttons.forEach(b => {
                const bText = b.getAttribute('data-choice');
                b.classList.remove('practice-hint');
                b.classList.add('disabled');
                if (bText === q.a) {
                    b.classList.add('correct');
                    if (!isCorrect) b.classList.add('waiting-correct');
                } else if (b === btn && !isCorrect) {
                    b.classList.add('incorrect');
                }
            });

            showJudgeOverlay(isCorrect);
            
            if (isCorrect) {
                setTimeout(() => {
                    recordResult('○');
                    judgeOverlay.className = "";
                }, 800);
            } else {
                isWaitingForCorrection = true;
            }
        }

        function recordResult(judge) {
            results.push({
                n: questions[currentIndex].n,
                p: questions[currentIndex].p,
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.n} ${res.p} ${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => openLine(text)).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); openLine(text); } catch (e) { alert("コピー失敗"); }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => alert("結果をコピーしました！LINEに貼り付けて送ってください。"), 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
</body>
